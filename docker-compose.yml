version: "3.9"

services:
  app-dev:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    profiles: ["dev"]

  app-prod:
    build:
      context: .
      target: production
    ports:
      - "80:80"
    env_file:
      - .env
    profiles: ["prod"]